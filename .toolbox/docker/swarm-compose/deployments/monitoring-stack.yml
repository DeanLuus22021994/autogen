# Sample Deployment: Monitoring Stack
# This is a sample deployment of the monitoring stack for AutoGen
version: '3.8'

services:
  prometheus:
    image: ${PROMETHEUS_IMAGE:-prom/prometheus:v2.45.0}
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.console.libraries=/usr/share/prometheus/console_libraries
      - --web.console.templates=/usr/share/prometheus/consoles
      - --web.enable-lifecycle
      - --storage.tsdb.retention.time=15d
    deploy:
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: '1'
          memory: 2G
      restart_policy:
        condition: on-failure
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - prometheus_config:/etc/prometheus
      - prometheus_data:/prometheus
    networks:
      - monitor-net
    configs:
      - source: prometheus_config
        target: /etc/prometheus/prometheus.yml
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  grafana:
    image: ${GRAFANA_IMAGE:-grafana/grafana:10.0.3}
    deploy:
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: '1'
          memory: 1G
      restart_policy:
        condition: any
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_INSTALL_PLUGINS=grafana-piechart-panel,grafana-clock-panel
      - GF_SERVER_ROOT_URL=${GRAFANA_URL:-http://localhost:3000}
    volumes:
      - grafana_data:/var/lib/grafana
    configs:
      - source: grafana_datasources
        target: /etc/grafana/provisioning/datasources/datasources.yaml
      - source: grafana_dashboards_provider
        target: /etc/grafana/provisioning/dashboards/dashboards.yaml
      - source: node_dashboard
        target: /var/lib/grafana/dashboards/node_exporter.json
      - source: gpu_dashboard
        target: /var/lib/grafana/dashboards/gpu_metrics.json
    networks:
      - monitor-net
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  node-exporter:
    image: ${NODE_EXPORTER_IMAGE:-prom/node-exporter:v1.6.0}
    deploy:
      mode: global
      resources:
        limits:
          cpus: '0.2'
          memory: 256M
      restart_policy:
        condition: on-failure
    command:
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --collector.filesystem.ignored-mount-points=^/(sys|proc|dev|host|etc)($$|/)
      - --collector.filesystem.ignored-fs-types=^(autofs|binfmt_misc|bpf|cgroup2|configfs|debugfs|devpts|devtmpfs|fusectl|hugetlbfs|mqueue|nsfs|overlay|proc|procfs|pstore|rpc_pipefs|securityfs|selinuxfs|squashfs|sysfs|tracefs)$
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    networks:
      - monitor-net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9100/metrics"]
      interval: 30s
      timeout: 10s
      retries: 3

  cadvisor:
    image: ${CADVISOR_IMAGE:-gcr.io/cadvisor/cadvisor:v0.47.2}
    deploy:
      mode: global
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
      restart_policy:
        condition: on-failure
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    devices:
      - /dev/kmsg:/dev/kmsg
    networks:
      - monitor-net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3

  dcgm-exporter:
    image: ${DCGM_EXPORTER_IMAGE:-nvidia/dcgm-exporter:3.1.7-3.1.4-ubuntu20.04}
    deploy:
      mode: global
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
      restart_policy:
        condition: on-failure
    command: -f /etc/dcgm-exporter/default-counters.csv
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
    networks:
      - monitor-net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9400/metrics"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  monitor-net:
    driver: overlay
    attachable: true

volumes:
  prometheus_data:
    driver: local
  prometheus_config:
    driver: local
  grafana_data:
    driver: local

configs:
  prometheus_config:
    file: ./configs/prometheus.yml
  grafana_datasources:
    file: ./configs/grafana-datasources.yml
  grafana_dashboards_provider:
    file: ./configs/grafana-dashboards.yml
  node_dashboard:
    file: ./configs/dashboards/node-exporter-dashboard.json
  gpu_dashboard:
    file: ./configs/dashboards/gpu-metrics-dashboard.json
