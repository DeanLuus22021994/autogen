# High-Availability Database Stack
# This template sets up a high-availability database cluster with PostgreSQL
version: '3.8'

services:
  postgres-primary:
    image: ${POSTGRES_IMAGE:-postgres:16-alpine}
    deploy:
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: '2'
          memory: 4G
      restart_policy:
        condition: on-failure
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-autogen}
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - postgres_primary_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - db-network

  postgres-replica:
    image: ${POSTGRES_IMAGE:-postgres:16-alpine}
    deploy:
      replicas: ${REPLICA_COUNT:-2}
      placement:
        constraints:
          - node.role == worker
      resources:
        limits:
          cpus: '1'
          memory: 2G
      restart_policy:
        condition: on-failure
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-autogen}
      - PGDATA=/var/lib/postgresql/data/pgdata
      - POSTGRES_HOST_AUTH_METHOD=trust
    volumes:
      - postgres_replica_data:/var/lib/postgresql/data
    depends_on:
      - postgres-primary
    command: >
      bash -c "
      until PGPASSWORD=$$POSTGRES_PASSWORD psql -h postgres-primary -U $$POSTGRES_USER -d $$POSTGRES_DB -c 'SELECT 1'; do
        echo 'Waiting for primary postgres...'
        sleep 3
      done
      echo 'Setting up replica...'
      rm -rf $$PGDATA/*
      pg_basebackup -h postgres-primary -D $$PGDATA -U $$POSTGRES_USER -P -v -R -w
      echo 'standby_mode = on' >> $$PGDATA/postgresql.conf
      echo 'primary_conninfo = ''host=postgres-primary port=5432 user=$$POSTGRES_USER password=$$POSTGRES_PASSWORD application_name=replica1'' >> $$PGDATA/postgresql.conf
      echo 'trigger_file = ''/tmp/pg_failover_trigger''' >> $$PGDATA/postgresql.conf
      pg_ctl -D $$PGDATA start
      "
    networks:
      - db-network

  pgadmin:
    image: ${PGADMIN_IMAGE:-dpage/pgadmin4:latest}
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: '0.5'
          memory: 1G
    environment:
      - PGADMIN_DEFAULT_EMAIL=${PGADMIN_EMAIL:-admin@example.com}
      - PGADMIN_DEFAULT_PASSWORD=${PGADMIN_PASSWORD:-admin}
      - PGADMIN_LISTEN_PORT=80
    ports:
      - "${PGADMIN_PORT:-8080}:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - db-network
    depends_on:
      - postgres-primary

networks:
  db-network:
    driver: overlay
    attachable: true

volumes:
  postgres_primary_data:
    driver: local
  postgres_replica_data:
    driver: local
  pgadmin_data:
    driver: local
