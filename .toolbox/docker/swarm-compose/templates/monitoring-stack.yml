# Monitoring Stack
# This template sets up Prometheus, Grafana, and Node Exporter for monitoring
version: '3.8'

services:
  prometheus:
    image: ${PROMETHEUS_IMAGE:-prom/prometheus:v2.45.0}
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.console.libraries=/usr/share/prometheus/console_libraries
      - --web.console.templates=/usr/share/prometheus/consoles
      - --web.enable-lifecycle
    deploy:
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: '1'
          memory: 2G
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./configs/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    networks:
      - monitoring-network

  grafana:
    image: ${GRAFANA_IMAGE:-grafana/grafana:10.0.3}
    deploy:
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: '1'
          memory: 1G
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - monitoring-network
    depends_on:
      - prometheus

  node-exporter:
    image: ${NODE_EXPORTER_IMAGE:-prom/node-exporter:v1.6.0}
    deploy:
      mode: global
      resources:
        limits:
          cpus: '0.2'
          memory: 256M
    command:
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --collector.filesystem.ignored-mount-points=^/(sys|proc|dev|host|etc)($$|/)
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    networks:
      - monitoring-network

  cadvisor:
    image: ${CADVISOR_IMAGE:-gcr.io/cadvisor/cadvisor:v0.47.2}
    deploy:
      mode: global
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks:
      - monitoring-network

  dcgm-exporter:
    image: ${DCGM_EXPORTER_IMAGE:-nvidia/dcgm-exporter:3.1.7-3.1.4-ubuntu20.04}
    deploy:
      mode: global
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    command: -f /etc/dcgm-exporter/default-counters.csv
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
    networks:
      - monitoring-network

networks:
  monitoring-network:
    driver: overlay
    attachable: true

volumes:
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
