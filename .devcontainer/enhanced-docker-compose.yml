version: '3.8'

services:
  devcontainer:
    build:
      context: .
      dockerfile: Enhanced-Dockerfile

    volumes:
      # Forwards the local Docker socket to the container
      - /var/run/docker.sock:/var/run/docker-host.sock
      # Mount the project code
      - ../..:/workspaces:cached
      # Persistent volumes for fast access to precompiled code
      - autogen-python-packages:/opt/autogen/python/packages
      - autogen-dotnet-artifacts:/opt/autogen/dotnet/artifacts
      - autogen-models:/opt/autogen/models
      # Mount specific directories for dev team
      - ../../dotnet/samples/dev-team:/workspaces/autogen/dotnet/samples/dev-team:cached

    # Setting environment variables for development
    environment:
      - DOTNET_ENVIRONMENT=Development
      - ASPNETCORE_ENVIRONMENT=Development
      - MODEL_RUNNER_ENDPOINT=http://model-runner.docker.internal/engines/v1/chat/completions
      - PYTHONPATH=/workspaces/autogen/python
      - PRECOMPILED_PACKAGES_PATH=/opt/autogen/python/packages
      - DOTNET_ARTIFACTS_PATH=/opt/autogen/dotnet/artifacts
      - MODEL_CACHE_PATH=/opt/autogen/models

    # Enable GPU passthrough if available (no driver installation needed)
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]
              count: all

    # Support for ptrace-based debuggers
    cap_add:
      - SYS_PTRACE
    security_opt:
      - seccomp:unconfined

    # Overrides default command so things don't shut down after the process ends
    entrypoint: /usr/local/share/docker-init.sh
    command: sleep infinity

    # Configure restart policy to run permanently
    restart: unless-stopped

volumes:
  # Define named volumes that persist between container restarts
  autogen-python-packages:
    name: autogen-python-packages
  autogen-dotnet-artifacts:
    name: autogen-dotnet-artifacts
  autogen-models:
    name: autogen-models
