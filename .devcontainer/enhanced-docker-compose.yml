# Docker Compose configuration for AutoGen Enhanced DevContainer
# with Docker Model Runner integration and persistent volumes
version: '3.8'

services:
  devcontainer:
    build:
      context: .
      dockerfile: Enhanced-Dockerfile
      args:
        PYTHON_VERSION: "3.10"
        DOTNET_VERSION: "8.0"
    volumes:
      - ..:/workspaces/autogen:cached
      - /var/run/docker.sock:/var/run/docker.sock
      - python-packages:/workspaces/autogen/python/.venv
      - dotnet-packages:/workspaces/autogen/dotnet/artifacts
      - model-cache:/opt/autogen/models
    environment:
      - MODEL_RUNNER_ENDPOINT=http://model-runner.docker.internal/engines/v1/chat/completions
      - MODEL_RUNNER_MODELS_ENDPOINT=http://model-runner.docker.internal/engines

    # DevContainer features - keep container running
    command: sleep infinity
    user: root

    # Add extra host for Docker Model Runner
    extra_hosts:
      - "model-runner.docker.internal:host-gateway"

    # Resource limits - adjust as needed
    deploy:
      resources:
        limits:
          memory: 8G
        reservations:
          memory: 1G

    # Health check for Docker Model Runner connectivity
    healthcheck:
      test: ["CMD", "curl", "-f", "http://model-runner.docker.internal/engines"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  # Persistent volumes for fast access to precompiled packages
  python-packages:
    name: autogen-python-packages
  dotnet-packages:
    name: autogen-dotnet-packages
  model-cache:
    name: autogen-model-cache