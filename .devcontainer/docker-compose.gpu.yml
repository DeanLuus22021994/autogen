# filepath: c:\Projects\autogen\.devcontainer\docker-compose.gpu.yml
# Docker Compose configuration for GPU-accelerated DevContainer
version: '3.8'

services:
  devcontainer:
    build:
      context: .
      dockerfile: Enhanced-Dockerfile
      args:
        PYTHON_VERSION: "3.10"
        DOTNET_VERSION: "8.0"
    volumes:
      - ..:/workspaces/autogen:cached
      - /var/run/docker.sock:/var/run/docker.sock
      - python-packages:/workspaces/autogen/python/.venv
      - dotnet-packages:/workspaces/autogen/dotnet/artifacts
      - model-cache:/opt/autogen/models
    environment:
      - MODEL_RUNNER_ENDPOINT=http://model-runner.docker.internal/engines/v1/chat/completions
      - MODEL_RUNNER_MODELS_ENDPOINT=http://model-runner.docker.internal/engines
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - CUDA_VISIBLE_DEVICES=0
      - PYTORCH_CUDA_ALLOC_CONF=max_split_size_mb:128
      - OMP_NUM_THREADS=8
      - MKL_NUM_THREADS=8

    # DevContainer features - keep container running
    command: sleep infinity
    user: root

    # Add extra host for Docker Model Runner
    extra_hosts:
      - "model-runner.docker.internal:host-gateway"

    # Resource limits - adjust as needed
    deploy:
      resources:
        limits:
          memory: 8G
          cpus: '4'
          # GPU resource for Docker Swarm mode
          generic_resources:
            - resource_type: gpu
              discrete_resource_spec:
                kind: gpus
                value: 1  # Number of GPUs to use
        reservations:
          memory: 1G

    # Add runtime for standalone Docker mode
    runtime: nvidia

    # Health check for container
    healthcheck:
      test: ["CMD-SHELL", "nvidia-smi > /dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  # Persistent volumes for fast access to precompiled packages
  python-packages:
    name: autogen-python-packages
  dotnet-packages:
    name: autogen-dotnet-packages
  model-cache:
    name: autogen-model-cache
