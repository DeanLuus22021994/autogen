name: Validate Environment Setup

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 0'  # Run weekly on Sunday at midnight

jobs:
  validate-environment:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate GitHub Token
        run: |
          TOKEN_STATUS=$(curl -s -o /dev/null -w "%{http_code}" -H "Authorization: token ${{ secrets.FORK_AUTOGEN_USER_PERSONAL_ACCESS_TOKEN }}" https://api.github.com/user)
          if [ "$TOKEN_STATUS" -eq 200 ]; then
            echo "GitHub Personal Access Token is valid"
          else
            echo "GitHub Personal Access Token is invalid or expired (Status: $TOKEN_STATUS)"
            exit 1
          fi
        env:
          FORK_AUTOGEN_USER_PERSONAL_ACCESS_TOKEN: ${{ secrets.FORK_AUTOGEN_USER_PERSONAL_ACCESS_TOKEN }}

      - name: Validate Repository Access
        run: |
          git config --global url."https://${{ secrets.FORK_AUTOGEN_USER_PERSONAL_ACCESS_TOKEN }}@github.com/${{ env.FORK_AUTOGEN_OWNER }}".insteadOf "git@github.com:${{ env.FORK_AUTOGEN_OWNER }}"
          git config --global url."https://${{ secrets.FORK_AUTOGEN_USER_PERSONAL_ACCESS_TOKEN }}@github.com/${{ env.FORK_AUTOGEN_OWNER }}".insteadOf "https://github.com/${{ env.FORK_AUTOGEN_OWNER }}"

          if git ls-remote "https://github.com/${{ env.FORK_AUTOGEN_OWNER }}/${{ env.REPO_PATH }}.git" HEAD; then
            echo "Repository access is working correctly"
          else
            echo "Failed to access repository. Check your credentials and repository existence."
            exit 1
          fi
        env:
          FORK_AUTOGEN_OWNER: DeanLuus22021994
          REPO_PATH: autogen
          FORK_AUTOGEN_USER_PERSONAL_ACCESS_TOKEN: ${{ secrets.FORK_AUTOGEN_USER_PERSONAL_ACCESS_TOKEN }}

      - name: Validate Docker Credentials
        run: |
          if echo "${{ secrets.FORK_USER_DOCKER_ACCESS_TOKEN }}" | docker login --username "${{ env.FORK_AUTOGEN_USER_DOCKER_USERNAME }}" --password-stdin; then
            echo "Docker credentials are valid"
            docker logout
          else
            echo "Docker credentials are invalid or expired"
            exit 1
          fi
        env:
          FORK_AUTOGEN_USER_DOCKER_USERNAME: deanluus22021994
          FORK_USER_DOCKER_ACCESS_TOKEN: ${{ secrets.FORK_USER_DOCKER_ACCESS_TOKEN }}

      - name: Validate Hugging Face Token
        run: |
          HF_STATUS=$(curl -s -o /dev/null -w "%{http_code}" -H "Authorization: Bearer ${{ secrets.FORK_HUGGINGFACE_ACCESS_TOKEN }}" https://huggingface.co/api/whoami)
          if [ "$HF_STATUS" -eq 200 ]; then
            echo "Hugging Face token is valid"
          else
            echo "Hugging Face token is invalid or expired (Status: $HF_STATUS)"
            exit 1
          fi
        env:
          FORK_HUGGINGFACE_ACCESS_TOKEN: ${{ secrets.FORK_HUGGINGFACE_ACCESS_TOKEN }}
