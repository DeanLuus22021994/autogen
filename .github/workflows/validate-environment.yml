name: Validate Environment and Secrets

on:
  push:
    branches: [ main, DeanDev ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  validate-environment:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Validate Required Secrets
        run: |
          echo "::group::Validating Required Secrets"
          missing=0

          required_secrets=(
            "FORK_AUTOGEN_USER_PERSONAL_ACCESS_TOKEN"
            "FORK_USER_DOCKER_ACCESS_TOKEN"
            "FORK_HUGGINGFACE_ACCESS_TOKEN"
          )

          for secret in "${required_secrets[@]}"; do
            if [ -n "${{ secrets[format('{0}', secret)] }}" ]; then
              echo "✅ Secret $secret is set"
            else
              echo "❌ Secret $secret is not set"
              missing=1
            fi
          done

          if [ $missing -eq 1 ]; then
            echo "::error::Some required secrets are missing. Please add them in your repository settings."
            exit 1
          fi

          echo "All required secrets are set! ✅"
          echo "::endgroup::"
        shell: bash

  scan-for-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Git Secret Scanner
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  lint-configs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Check VS Code config files for tokens
        run: |
          echo "::group::Checking VS Code config files"

          # Check mcp.json for directly embedded tokens
          if grep -q 'GITHUB_PERSONAL_ACCESS_TOKEN.*=.*\"ghp_' .vscode/mcp.json 2>/dev/null; then
            echo "::error::Found hardcoded token in .vscode/mcp.json"
            exit 1
          elif grep -q 'GITHUB_PERSONAL_ACCESS_TOKEN.*=.*\"github_pat_' .vscode/mcp.json 2>/dev/null; then
            echo "::error::Found hardcoded token in .vscode/mcp.json"
            exit 1
          fi

          # Ensure environment variable references use the correct format
          if ! grep -q 'GITHUB_PERSONAL_ACCESS_TOKEN.*=.*\"\$\{env:FORK_AUTOGEN_USER_PERSONAL_ACCESS_TOKEN\}\"' .vscode/mcp.json 2>/dev/null; then
            echo "::warning::mcp.json should use \${env:FORK_AUTOGEN_USER_PERSONAL_ACCESS_TOKEN} for GitHub token"
          fi

          # Check all .vscode/*.json files for potential tokens
          for file in .vscode/*.json; do
            if [[ -f "$file" ]]; then
              echo "Checking $file for tokens..."
              if grep -E 'ghp_[a-zA-Z0-9]{36}|github_pat_[a-zA-Z0-9]{22}_[a-zA-Z0-9]{59}|sk-[a-zA-Z0-9]{48}|key-[a-zA-Z0-9]{24}|xoxb-[a-zA-Z0-9\-]{50,}' "$file"; then
                echo "::error::Found potential token in $file"
                exit 1
              fi
            fi
          done

          echo "VS Code config files check complete ✅"
          echo "::endgroup::"
        shell: bash

  vscode-files-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Validate VS Code configuration files
        run: |
          echo "::group::Validating VS Code configuration files"

          # Check if VS Code files exist and are tracked
          tracked_files=(
            ".vscode/extensions.json"
            ".vscode/launch.json"
            ".vscode/mcp.json"
            ".vscode/settings.json"
            ".vscode/tasks.json"
          )

          for file in "${tracked_files[@]}"; do
            if [[ -f "$file" ]]; then
              echo "✅ $file exists"

              # Check if file is tracked by git
              if git ls-files --error-unmatch "$file" &>/dev/null; then
                echo "  ✅ $file is tracked by git"
              else
                echo "  ❌ $file is not tracked by git"
                echo "::warning::$file should be tracked in the repository"
              fi
            else
              echo "❓ $file does not exist"
            fi
          done

          echo "VS Code configuration files validation complete"
          echo "::endgroup::"
        shell: bash
