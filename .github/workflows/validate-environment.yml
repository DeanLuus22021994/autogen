name: Validate Environment and Secrets

on:
  push:
    branches: [main, develop, master]
  pull_request:
    branches: [main, develop, master]
  workflow_dispatch:

jobs:
  validate-environment:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up PowerShell
        shell: bash
        run: |
          # Use the pre-installed PowerShell on GitHub runners
          pwsh --version

      - name: Validate Required Secrets
        shell: pwsh
        run: |
          echo "::group::Validating Required Secrets"
          $requiredSecrets = @(
            "FORK_AUTOGEN_USER_PERSONAL_ACCESS_TOKEN",
            "FORK_HUGGINGFACE_ACCESS_TOKEN",
            "FORK_USER_DOCKER_ACCESS_TOKEN"
          )
          $missing = $false
          foreach ($secret in $requiredSecrets) {
            # Check if the secret exists via env vars in GitHub Actions
            $secretEnvName = "SECRETS_$secret"
            $hasSecret = (Get-Item env:$secretEnvName -ErrorAction SilentlyContinue) -ne $null

            if (-not $hasSecret) {
              Write-Host "❌ Secret $secret is not set"
              $missing = $true
            } else {
              Write-Host "✅ Secret $secret is set"
            }
          }

          if ($missing) {
            Write-Host "::error::Some required secrets are missing. Please add them in your repository settings."
            exit 1
          }

          Write-Host "All required secrets are set! ✅"
          echo "::endgroup::"
        env:
          # Note: In a production environment, ensure these secrets are properly configured
          SECRETS_FORK_AUTOGEN_USER_PERSONAL_ACCESS_TOKEN: ${{ secrets.FORK_AUTOGEN_USER_PERSONAL_ACCESS_TOKEN }}
          SECRETS_FORK_HUGGINGFACE_ACCESS_TOKEN: ${{ secrets.FORK_HUGGINGFACE_ACCESS_TOKEN }}
          SECRETS_FORK_USER_DOCKER_ACCESS_TOKEN: ${{ secrets.FORK_USER_DOCKER_ACCESS_TOKEN }}

      - name: Check Security Configuration
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          # Import modules from automation directory
          $modulePath = "./.scripts/automation/github"
          Import-Module "$modulePath/Common.psm1" -Force
          Import-Module "$modulePath/Security.psm1" -Force

          Write-Host "## Security Configuration Check"

          # Check VS Code configuration for security issues
          $vsCodeDir = Join-Path $PWD ".vscode"
          if (Test-Path $vsCodeDir) {
            $vsCodeFiles = Get-ChildItem -Path $vsCodeDir -Filter "*.json" | Select-Object -ExpandProperty FullName
            $issues = Find-ExposedTokens -FilePaths $vsCodeFiles

            if ($issues.Count -gt 0) {
              Write-Host "Found potential security issues in VS Code configuration"
              foreach ($issue in $issues) {
                Write-Host "$($issue.File): $($issue.Issue)"
              }
              exit 1
            } else {
              Write-Host "No security issues found in VS Code configuration"
            }
          } else {
            Write-Host "VS Code configuration directory not found"
          }

  scan-for-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history for scanning

      - name: Setup PowerShell Core
        uses: microsoft/setup-powershell@v1
        with:
          powershell-version: '7.3'

      - name: Scan for exposed secrets
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          # Import modules from automation directory
          $modulePath = "./.scripts/automation/github"
          Import-Module "$modulePath/Common.psm1" -Force
          Import-Module "$modulePath/Security.psm1" -Force

          Write-Host "## Repository Security Scan"

          # File types to scan for tokens
          $fileTypes = @("*.ps1", "*.py", "*.js", "*.ts", "*.json", "*.md", "*.ipynb")
          $filesToScan = @()

          foreach ($type in $fileTypes) {
            $files = Get-ChildItem -Path $PWD -Filter $type -Recurse -File -ErrorAction SilentlyContinue |
                    Where-Object { $_.FullName -notmatch "\\node_modules\\" -and $_.FullName -notmatch "\\.git\\" }
            $filesToScan += $files.FullName
          }

          # Limit to recently changed files in PRs to speed up checks
          if ("${{ github.event_name }}" -eq "pull_request") {
            Write-Host "Scanning only changed files in PR"
            $changedFiles = git diff --name-only HEAD~1 HEAD
            $filesToScan = $filesToScan | Where-Object { $changedFiles -contains ($_ -replace [regex]::Escape($PWD.ToString() + "/"), "") }
          }

          $exposedTokens = Find-ExposedTokens -FilePaths $filesToScan

          if ($exposedTokens.Count -gt 0) {
            Write-Host "Found potential exposed tokens in $($exposedTokens.Count) files:"
            foreach ($issue in $exposedTokens) {
              Write-Host "$($issue.File): $($issue.Issue)"
            }
            exit 1
          } else {
            Write-Host "No exposed tokens found in scanned files"
          }

  validate-dotnet:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore ./dotnet/AutoGen.sln

      - name: Build
        run: dotnet build ./dotnet/AutoGen.sln --no-restore

  validate-python:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest mypy ruff
          pip install -e "./python/[dev]"

      - name: Validate Python configuration
        run: |
          python -c "import autogen; print(f'AutoGen version: {autogen.__version__}')"

      - name: Run mypy validation
        run: |
          # Create a fixed mypy.ini if it doesn't exist
          if [ ! -f "mypy.ini" ] || grep -q "parsing errors" "mypy.ini"; then
            cat > mypy.ini << EOF
[mypy]
disallow_untyped_defs = True
disallow_incomplete_defs = True
check_untyped_defs = True
disallow_untyped_decorators = True
no_implicit_optional = True
strict_optional = True
warn_redundant_casts = True
warn_return_any = True
warn_unused_ignores = True
warn_unused_configs = True

[mypy.plugins.numpy.*]
follow_imports = skip

[mypy.plugins.pandas.*]
follow_imports = skip

[mypy-numpy]
ignore_missing_imports = True

[mypy-pandas]
ignore_missing_imports = True

[mypy-matplotlib]
ignore_missing_imports = True

[mypy-seaborn]
ignore_missing_imports = True

[mypy-scipy]
ignore_missing_imports = True

[mypy-sklearn]
ignore_missing_imports = True

[mypy-transformers]
ignore_missing_imports = True

[mypy-torch]
ignore_missing_imports = True
EOF
          fi

          # Run mypy on Python code
          mypy ./python/autogen

  lint-configs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check VS Code config files for tokens
        shell: bash
        run: |
          echo "::group::Checking VS Code config files"

          # Check mcp.json for directly embedded tokens
          if grep -q 'GITHUB_PERSONAL_ACCESS_TOKEN.*=.*\"ghp_' .vscode/mcp.json 2>/dev/null; then
            echo "::error::Found hardcoded token in .vscode/mcp.json"
            exit 1
          elif grep -q 'GITHUB_PERSONAL_ACCESS_TOKEN.*=.*\"github_pat_' .vscode/mcp.json 2>/dev/null; then
            echo "::error::Found hardcoded token in .vscode/mcp.json"
            exit 1
          fi

          # Check launch.json for directly embedded tokens
          if grep -q 'ghp_' .vscode/launch.json 2>/dev/null; then
            echo "::error::Found hardcoded token in .vscode/launch.json"
            exit 1
          elif grep -q 'github_pat_' .vscode/launch.json 2>/dev/null; then
            echo "::error::Found hardcoded token in .vscode/launch.json"
            exit 1
          fi

          # Check settings.json for directly embedded tokens
          if grep -q 'ghp_' .vscode/settings.json 2>/dev/null; then
            echo "::error::Found hardcoded token in .vscode/settings.json"
            exit 1
          elif grep -q 'github_pat_' .vscode/settings.json 2>/dev/null; then
            echo "::error::Found hardcoded token in .vscode/settings.json"
            exit 1
          fi

          # Ensure environment variable references use the correct format
          if [ -f .vscode/mcp.json ] && ! grep -q 'GITHUB_PERSONAL_ACCESS_TOKEN.*=.*\"\$\{env:' .vscode/mcp.json 2>/dev/null; then
            echo "::warning::mcp.json should use \${env:VARIABLE_NAME} syntax for environment variables"
          fi

          echo "No hardcoded tokens found in VS Code config files ✅"
          echo "::endgroup::"

      - name: Validate Environment Configuration
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          # Run a custom environment validation script
          if (Test-Path "./.scripts/automation/orchestration/Validate-Environment.ps1") {
            & "./.scripts/automation/orchestration/Validate-Environment.ps1" -Verbose
          } else {
            Write-Host "Environment validation script not found, skipping this check"
          }

      - name: Check for Custom Dictionary
        shell: pwsh
        run: |
          $ErrorActionPreference = "Continue"
          $dictionaryPath = "./.vscode/cspell-dict.txt"

          if (-not (Test-Path $dictionaryPath)) {
            Write-Host "Creating custom dictionary for spellchecking..."
            @'
# AutoGen Custom Dictionary
autogen
mcp
vscode
devcontainer
github
powershell
pwsh
dotnet
huggingface
openai
langchain
pypi
conda
numpy
tensorflow
pytorch
langchain
gpt
llm
transformers
keras
scikit
scipy
matplotlib
seaborn
jupyter
ipynb
nlp
tokenizer
fastapi
uvicorn
pydantic
asyncio
aiohttp
pytest
mypy
ruff
flake8
azdure
esrp
'@ | Out-File -FilePath $dictionaryPath -Encoding utf8
            Write-Host "Created custom dictionary at $dictionaryPath"
          } else {
            Write-Host "Custom dictionary exists at $dictionaryPath"
          }

          # Make sure the dictionary is referenced in VS Code settings
          $settingsPath = "./.vscode/settings.json"
          if (Test-Path $settingsPath) {
            $settings = Get-Content $settingsPath -Raw | ConvertFrom-Json
            if (-not ($settings.'cSpell.customDictionaries'.dict)) {
              Write-Host "Updating VS Code settings to use the custom dictionary"
              $settings | Add-Member -NotePropertyName 'cSpell.customDictionaries' -NotePropertyValue @{
                dict = @{
                  name = "autogen-words"
                  path = "./.vscode/cspell-dict.txt"
                  description = "Custom dictionary for AutoGen project"
                  addWords = $true
                }
              } -Force
              $settings | ConvertTo-Json -Depth 10 | Out-File -FilePath $settingsPath -Encoding utf8
            }
          }

  vscode-files-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate VS Code configuration files
        shell: bash
        run: |
          echo "::group::Validating VS Code configuration files"

          # Check if VS Code files exist and are tracked
          tracked_files=(
            ".vscode/extensions.json"
            ".vscode/launch.json"
            ".vscode/mcp.json"
            ".vscode/settings.json"
            ".vscode/tasks.json"
          )

          for file in "${tracked_files[@]}"; do
            if [[ -f "$file" ]]; then
              echo "✅ $file exists"

              # Check if file is tracked by git
              if git ls-files --error-unmatch "$file" &>/dev/null; then
                echo "  ✅ $file is tracked by git"
              else
                echo "  ❌ $file is not tracked by git"
                echo "::warning::$file should be tracked in the repository"
              fi
            else
              echo "❓ $file does not exist"
            fi
          done

          echo "VS Code configuration files validation complete"
          echo "::endgroup::"